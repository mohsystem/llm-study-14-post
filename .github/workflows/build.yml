name: SonarCloud CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      # 3️⃣ Setup Gradle (no wrapper required)
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.2

      # 4️⃣ Optional: Clear Gradle cache to prevent corruption
      - name: Clear Gradle cache (fresh build)
        run: rm -rf ${{ runner.temp }}/gradle

      # 5️⃣ Build and run SonarCloud analysis
      - name: Build and analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GRADLE_USER_HOME: ${{ runner.temp }}/gradle  # fresh, writable cache
        run: gradle build sonarqube \
          -Dsonar.projectKey=mohsystem_llm-study-14-pre2 \
          -Dsonar.organization=mohsystem \
          -Dsonar.host.url=https://sonarcloud.io
